# ─── Decap CMS Configuration ────────────────────────────────────────────────
# This file controls what Paulina can edit in her admin portal at /admin
# Docs: https://decapcms.org/docs/configuration-options/

backend:
  name: git-gateway
  branch: main

# Where media uploads go
media_folder: public/images
public_folder: /images

# Enable editorial workflow (optional: saves drafts before publishing)
# publish_mode: editorial_workflow

collections:

  # ── SETTINGS ──────────────────────────────────────────────────────────────
  - label: "⚙️ Business Settings"
    name: settings
    files:
      - label: "Business Settings"
        name: settings
        file: content/settings.json
        fields:
          - label: "Business Name"
            name: businessName
            widget: string
            hint: "Displayed in the footer and browser tab."

          - label: "Tagline"
            name: tagline
            widget: string
            hint: "Short tagline shown in the footer."

          - label: "Hero Subtitle"
            name: heroSubtitle
            widget: text
            hint: "The paragraph of text on the homepage hero section."

          - label: "About — Paragraph 1"
            name: aboutText1
            widget: text

          - label: "About — Paragraph 2"
            name: aboutText2
            widget: text

          - label: "Email"
            name: email
            widget: string

          - label: "Phone"
            name: phone
            widget: string

          - label: "Location"
            name: location
            widget: string
            hint: "City/state shown publicly (e.g. Cypress, California)"

          - label: "Location Note"
            name: locationNote
            widget: string
            hint: "Shown under the location (e.g. Exact address shared upon booking confirmation.)"

          - label: "Weekday Hours"
            name: hoursWeekday
            widget: string
            hint: "e.g. Tuesday – Friday · 5:30 PM – 8:30 PM"

          - label: "Saturday Hours"
            name: hoursSaturday
            widget: string

          - label: "Closed Days"
            name: hoursClosed
            widget: string

          - label: "Booking Section Note"
            name: bookingNote
            widget: text
            hint: "Text shown above the booking form."

          - label: "Deposit & Cancellation Policy"
            name: depositPolicy
            widget: text
            hint: "Full policy text shown inside the booking form."

          - label: "Google Calendar Embed URL"
            name: googleCalendarSrc
            widget: string
            required: false
            hint: >
              Go to Google Calendar → Settings → click your calendar → scroll to
              'Integrate calendar' → copy the 'Embed code' src URL. Paste just the URL here
              (starting with https://calendar.google.com/calendar/embed?...).

          - label: "Google Calendar Note (internal)"
            name: googleCalendarNote
            widget: string
            required: false

  # ── FACIAL SERVICES ───────────────────────────────────────────────────────
  - label: "💆 Facials & Services"
    name: services
    files:
      - label: "Facial Menu & Waxing"
        name: services
        file: content/services.json
        fields:
          - label: "Facial Services"
            name: facials
            widget: list
            label_singular: "Facial"
            summary: "{{fields.name}} — ${{fields.price}}"
            fields:
              - label: "ID (do not change)"
                name: id
                widget: string
                hint: "Internal ID — do not change after site launches."

              - label: "Service Name"
                name: name
                widget: string

              - label: "Badge Label"
                name: tag
                widget: string
                required: false
                hint: "Short badge shown on the card, e.g. 'Most Popular', 'Best Seller'"

              - label: "Duration"
                name: duration
                widget: string
                hint: "e.g. 60 Minutes"

              - label: "Price ($)"
                name: price
                widget: number
                value_type: int
                min: 0

              - label: "Description"
                name: description
                widget: text

              - label: "Benefit Tags"
                name: benefits
                widget: list
                field:
                  label: Benefit
                  name: benefit
                  widget: string
                hint: "Short tags shown at the bottom of the card, e.g. Deep Hydration"

          - label: "Waxing Services"
            name: waxing
            widget: list
            label_singular: "Waxing Service"
            summary: "{{fields.name}} — ${{fields.price}}"
            fields:
              - label: "ID (do not change)"
                name: id
                widget: string

              - label: "Service Name"
                name: name
                widget: string

              - label: "Badge Label"
                name: tag
                widget: string
                required: false

              - label: "Duration"
                name: duration
                widget: string

              - label: "Price ($)"
                name: price
                widget: number
                value_type: int
                min: 0

              - label: "Description"
                name: description
                widget: text

  # ── ADD-ONS ───────────────────────────────────────────────────────────────
  - label: "✨ Add-On Enhancements"
    name: addons
    files:
      - label: "Add-On Menu"
        name: addons
        file: content/addons.json
        fields:
          - label: "Add-Ons"
            name: addons
            widget: list
            label_singular: "Add-On"
            summary: "{{fields.name}} — +${{fields.price}}"
            fields:
              - label: "ID (do not change)"
                name: id
                widget: string

              - label: "Add-On Name"
                name: name
                widget: string

              - label: "Price ($)"
                name: price
                widget: number
                value_type: int
                min: 0

              - label: "Description"
                name: description
                widget: text
                hint: "Short description shown in the booking form and menu."
